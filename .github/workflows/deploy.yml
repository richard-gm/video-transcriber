name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  SERVICE_NAME: video-transcriber
  REGION: us-central1
  REPO: video-transcriber

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image
        run: |
          gcloud builds submit \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.REPO }}/app:latest

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.REPO }}/app:latest
          env_vars: |
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            SUPABASE_TABLE=${{ vars.SUPABASE_TABLE || 'videos' }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_SECRET_TOKEN=${{ secrets.TELEGRAM_SECRET_TOKEN }}
            WHISPER_MODEL=${{ vars.WHISPER_MODEL || 'base' }}
            MAX_CONCURRENT_JOBS=1
            LOG_LEVEL=info
          flags: |
            --cpu=2
            --memory=4Gi
            --timeout=3600
            --min-instances=0
            --max-instances=1
            --cpu-boost
            --concurrency=default
            --ingress=all
            --service-account=video-transcriber@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com
            --allow-unauthenticated
            --startup-probe-tcp=8080
            --startup-probe-initial-delay-seconds=60
            --liveness-probe-http=/health
            --liveness-probe-initial-delay-seconds=120

      - name: Show deploy URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
