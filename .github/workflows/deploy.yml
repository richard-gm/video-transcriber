name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'infra/**'
      - '.gitignore'
      - '.dockerignore'
      - '.env.example'
      - 'readm_next_phase.md'

env:
  SERVICE_NAME: video-transcriber
  JOB_NAME: video-transcriber-worker
  REGION: us-central1
  REPO: video-transcriber

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.REPO }}/app:latest
          BUILD_ID=$(gcloud builds submit --tag $IMAGE --async --format="value(id)" --quiet)
          echo "Build submitted: $BUILD_ID"
          echo "Waiting for build to complete..."
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" --format="value(status)" --quiet 2>/dev/null)
            case "$STATUS" in
              SUCCESS) echo "Build succeeded!"; break ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|FAILED)
                echo "Build $STATUS — check https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=${{ vars.GCP_PROJECT_ID }}"
                exit 1 ;;
              WORKING|QUEUED) sleep 15 ;;
              *) echo "Unknown status: $STATUS"; sleep 15 ;;
            esac
          done

      - name: Get existing service URL (for HANDLER_URL)
        id: service-url
        continue-on-error: true
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)" \
            --quiet 2>/dev/null || echo "")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.REPO }}/app:latest
          env_vars: |
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            SUPABASE_TABLE=${{ vars.SUPABASE_TABLE || 'videos' }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_SECRET_TOKEN=${{ secrets.TELEGRAM_SECRET_TOKEN }}
            GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }}
            CLOUD_RUN_REGION=${{ env.REGION }}
            TASK_QUEUE_PATH=projects/${{ vars.GCP_PROJECT_ID }}/locations/${{ env.REGION }}/queues/transcription-queue
            HANDLER_URL=${{ steps.service-url.outputs.url }}
            CLOUD_RUN_JOB_NAME=${{ env.JOB_NAME }}
            LOG_LEVEL=info
          flags: |
            --cpu=1
            --memory=512Mi
            --timeout=300
            --min-instances=0
            --max-instances=1
            --cpu-boost
            --concurrency=default
            --ingress=all
            --service-account=video-transcriber@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com
            --allow-unauthenticated

      - name: Deploy Cloud Run Job (long-running worker)
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.REPO }}/app:latest

          gcloud run jobs deploy ${{ env.JOB_NAME }} \
            --region=${{ env.REGION }} \
            --image=$IMAGE \
            --command=node \
            --args=src/worker.js \
            --cpu=2 \
            --memory=4Gi \
            --task-timeout=36000 \
            --max-retries=0 \
            --service-account=video-transcriber@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars="SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
            --set-env-vars="SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" \
            --set-env-vars="SUPABASE_TABLE=${{ vars.SUPABASE_TABLE || 'videos' }}" \
            --set-env-vars="WHISPER_MODEL=${{ vars.WHISPER_MODEL || 'base' }}" \
            --set-env-vars="TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            --set-env-vars="WHISPER_THREADS=2" \
            --set-env-vars="LOG_LEVEL=info" \
            --set-env-vars="GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"

      - name: Show deploy URL
        run: |
          echo "Service deployed to ${{ steps.deploy.outputs.url }}"
          echo ""
          echo "On first deploy, HANDLER_URL starts empty — Cloud Tasks are skipped."
          echo "After this deploy succeeds, push again to enable async queuing."
          echo ""
          echo "To verify the worker job:"
          echo "  gcloud run jobs describe ${{ env.JOB_NAME }} --region=${{ env.REGION }}"
