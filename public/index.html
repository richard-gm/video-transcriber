<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Transcriber</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 720px; margin: 0 auto; }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: #fff;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 0.5rem; }

    input[type="url"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="url"]:focus { border-color: #555; }
    input[type="url"]::placeholder { color: #444; }

    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.75rem;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .status {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #888;
      min-height: 1.2em;
    }

    .error { color: #f87171; }

    .result-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .result-url {
      font-size: 0.75rem;
      color: #666;
      word-break: break-all;
      margin-bottom: 0.6rem;
    }
    .toggle-btn {
      background: none;
      border: none;
      color: #7dd3fc;
      font-size: 0.7rem;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      margin-left: 1rem;
    }
    .toggle-btn:hover { color: #99e6ff; }

    .result-text {
      font-size: 0.85rem;
      white-space: pre-wrap;
    }

    .result-date {
      font-size: 0.7rem;
      color: #555;
      margin-top: 0.6rem;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.5rem;
      max-width: 360px;
      width: 90%;
      text-align: center;
    }
    .modal-box p {
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
      color: #e8e8e8;
    }
    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
    }
    .modal-actions button {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid #333;
      background: #111;
      color: #aaa;
      transition: background 0.2s;
    }
    .modal-actions button:hover { background: #222; }
    .modal-actions .modal-danger {
      background: transparent;
      color: #f87171;
      border-color: #f87171;
    }
    .modal-actions .modal-danger:hover { background: #3b1a1a; }

    .section-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 1rem;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #444;
      border-top-color: #aaa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-badge.pending { background: #333; color: #aaa; }
    .status-badge.processing { background: #1e3a5f; color: #7dd3fc; }
    .status-badge.error { background: #3b1a1a; color: #f87171; }
    .status-badge.cancelled { background: #3b3b1a; color: #fcd34d; }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #2a2a2a;
      border-radius: 3px;
      margin-top: 0.75rem;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #7dd3fc;
      border-radius: 3px;
      transition: width 1s ease;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #888;
      margin-top: 0.4rem;
    }

    .cancel-btn {
      padding: 0.25rem 0.6rem;
      background: transparent;
      color: #f87171;
      border: 1px solid #f87171;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: background 0.2s;
      vertical-align: middle;
    }
    .cancel-btn:hover { background: #3b1a1a; }

    .delete-btn {
      background: none;
      border: none;
      color: #666;
      font-size: 0.7rem;
      cursor: pointer;
      padding: 0;
      margin-left: 1rem;
      text-decoration: underline;
      transition: color 0.2s;
    }
    .delete-btn:hover { color: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Video Transcriber</h1>
    <p class="subtitle">YouTube · TikTok · Instagram — download and transcribe locally</p>

    <div class="card">
      <label for="url">Video URL</label>
      <input
        type="url"
        id="url"
        placeholder="https://www.youtube.com/watch?v=..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="submit-btn" onclick="processVideo()">Transcribe</button>
      <div class="status" id="status"></div>
    </div>

    <div id="history-section" style="display:none">
      <p class="section-title">Previous transcriptions</p>
      <div id="history"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <p id="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-cancel">Cancel</button>
        <button class="modal-danger" id="modal-confirm">Delete</button>
      </div>
    </div>
  </div>

  <script>
    async function processVideo() {
      const urlInput = document.getElementById('url');
      const btn = document.getElementById('submit-btn');
      const status = document.getElementById('status');
      const url = urlInput.value.trim();

      if (!url) return;

      btn.disabled = true;
      status.innerHTML = '<span class="spinner"></span> Queuing transcription…';
      status.className = 'status';

      try {
        const res = await fetch('/process', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();

        if (!res.ok) {
          status.textContent = '❌ ' + (data.error || 'Something went wrong');
          status.className = 'status error';
          return;
        }

        const jobId = data.id;
        status.setAttribute('data-job-id', jobId);
        status.innerHTML = '<span class="spinner"></span> Job queued — waiting for result…';

        let pollRetries = 0;

        window._pollInterval = setInterval(async () => {
          if (!status.getAttribute('data-job-id')) return;
          const pollRes = await fetch('/api/status/' + jobId);
          const job = await pollRes.json();
          if (!pollRes.ok) {
            pollRetries++;
            if (pollRetries < 10) return;
            status.textContent = '❌ ' + (job.error || 'Failed to check status');
            status.className = 'status error';
            clearInterval(window._pollInterval);
            return;
          }
          pollRetries = 0;
          if (job.status === 'done') {
            status.innerHTML = '✓ Done';
            urlInput.value = '';
            prependResult(job);
            loadHistory();
            clearInterval(window._pollInterval);
            return;
          }
          if (job.status === 'error') {
            status.innerHTML = '❌ ' + (job.error || 'Processing failed');
            status.className = 'status error';
            clearInterval(window._pollInterval);
            return;
          }
          if (job.status === 'cancelled') {
            status.innerHTML = '✕ Cancelled';
            status.className = 'status';
            clearInterval(window._pollInterval);
            return;
          }
          const p = job.progress || {};
          const pct = p.percentage || 0;
          const msg = p.message || job.status;
          const eta = p.eta ? ' &middot; ETA ' + p.eta : '';
          status.innerHTML = `
            <span class="spinner"></span> ${escHtml(msg)}${eta}
            <div class="progress-bar">
              <div class="progress-bar-fill" style="width:${pct}%"></div>
            </div>
            <div class="progress-info">
              <span>${pct}%</span>
              <span>${escHtml(p.stage || 'processing')}</span>
            </div>
            <button class="cancel-btn" onclick="cancelJob()">Cancel</button>`;
        }, 3000);
      } catch (err) {
        status.textContent = '❌ Network error: ' + err.message;
        status.className = 'status error';
      } finally {
        btn.disabled = false;
      }
    }

    function prependResult(entry) {
      const section = document.getElementById('history-section');
      section.style.display = 'block';
      const container = document.getElementById('history');
      container.insertAdjacentHTML('afterbegin', renderCard(entry));
    }

    function escAttr(s) {
      return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function renderCard(entry) {
      const date = new Date(entry.created_at).toLocaleString();
      const error = entry.error ? `<div class="error">${escHtml(entry.error)}</div>` : '';
      const statusLabel = entry.status !== 'done' ? `<div class="status-badge ${entry.status}">${entry.status}</div>` : '';
      let transcriptHtml = '';
      let toggleBtnHtml = '';
      if (entry.transcript) {
        const words = entry.transcript.split(/\s+/);
        if (words.length > 100) {
          const fullRaw = entry.transcript;
          const shortRaw = words.slice(0, 100).join(' ') + '…';
          transcriptHtml = `<div class="result-text" id="text-${escHtml(entry.id)}" data-full="${escAttr(fullRaw)}" data-short="${escAttr(shortRaw)}">${escHtml(shortRaw)}</div>`;
          toggleBtnHtml = `<button class="toggle-btn" id="toggle-${escHtml(entry.id)}" onclick="toggleText('${escHtml(entry.id)}')">show more</button>`;
        } else {
          transcriptHtml = `<div class="result-text">${escHtml(entry.transcript)}</div>`;
        }
      }
      return `
        <div class="result-card" id="card-${escHtml(entry.id)}">
          <div class="result-url">${escHtml(entry.url)}</div>
          ${statusLabel}
          ${transcriptHtml}
          ${error}
          <div class="result-date">${date} ${toggleBtnHtml}<button class="delete-btn" onclick="deleteEntry('${escHtml(entry.id)}')">delete</button></div>
        </div>`;
    }

    function escHtml(str) {
      return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function loadHistory() {
      try {
        const res = await fetch('/transcriptions');
        const records = await res.json();
        if (!records.length) return;
        const section = document.getElementById('history-section');
        section.style.display = 'block';
        document.getElementById('history').innerHTML = records.map(renderCard).join('');
      } catch {}
    }

    // Poll interval reference for cancel
    window._pollInterval = null;

    // Global cancel handler — reads job ID from the status element
    window.cancelJob = function () {
      const status = document.getElementById('status');
      const jobId = status.getAttribute('data-job-id');
      if (!jobId) return;
      status.removeAttribute('data-job-id');
      if (window._pollInterval) {
        clearInterval(window._pollInterval);
        window._pollInterval = null;
      }
      status.innerHTML = '<span class="spinner"></span> Cancelling…';
      fetch('/api/cancel/' + jobId, { method: 'POST' }).catch(() => {});
    };

    // Modal confirm — returns a Promise<boolean>
    window.confirmModal = function (msg) {
      return new Promise((resolve) => {
        const overlay = document.getElementById('modal');
        document.getElementById('modal-message').textContent = msg;
        overlay.classList.add('active');
        const cleanup = () => overlay.classList.remove('active');
        document.getElementById('modal-cancel').onclick = () => { cleanup(); resolve(false); };
        document.getElementById('modal-confirm').onclick = () => { cleanup(); resolve(true); };
        overlay.onclick = (e) => { if (e.target === overlay) { cleanup(); resolve(false); } };
      });
    };

    // Global delete handler — confirms, then removes the card
    window.deleteEntry = async function (id) {
      const ok = await window.confirmModal('Delete this transcription?');
      if (!ok) return;
      const res = await fetch('/api/delete/' + id, { method: 'DELETE' });
      if (!res.ok) return alert('Failed to delete');
      const card = document.getElementById('card-' + id);
      if (card) {
        card.style.transition = 'opacity 0.3s';
        card.style.opacity = '0';
        setTimeout(() => {
          card.remove();
          if (!document.querySelector('.result-card')) {
            document.getElementById('history-section').style.display = 'none';
          }
        }, 300);
      }
    };

    // Global toggle handler — expands/collapses long transcripts
    window.toggleText = function (id) {
      const el = document.getElementById('text-' + id);
      const btn = document.getElementById('toggle-' + id);
      if (!el || !btn) return;
      const full = el.getAttribute('data-full');
      const short = el.getAttribute('data-short');
      if (el.__collapsed === undefined) el.__collapsed = true;
      if (el.__collapsed) {
        el.innerHTML = escHtml(full);
        btn.textContent = 'show less';
        el.__collapsed = false;
      } else {
        el.innerHTML = escHtml(short);
        btn.textContent = 'show more';
        el.__collapsed = true;
      }
    };

    // Allow Enter key to submit
    document.getElementById('url').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') processVideo();
    });

    loadHistory();
  </script>
</body>
</html>
